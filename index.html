<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Camera Uploader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h2>Upload Photo to GitHub</h2>
    <input
      type="file"
      accept="image/*"
      capture="environment"
      id="cameraInput"
    />
    <p id="status"></p>

    <script>
      const token = "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";
      const owner = "sbachinin";
      const repo = "osm-ids-to-photos";
      const branch = "main";

      const input = document.getElementById("cameraInput");
      const status = document.getElementById("status");

      input.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        status.textContent = "Processing...";

        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onload = async () => {
          const base64 = reader.result.split(",")[1];
          const filename = `image_${Date.now()}.jpg`;

          const response = await fetch(
            `https://api.github.com/repos/${owner}/${repo}/contents/${filename}`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${token}`,
                "Accept": "application/vnd.github+json",
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                message: "Upload image from smartphone",
                content: base64,
                branch: branch,
              }),
            },
          );

          if (response.ok) {
            status.textContent = "Uploaded successfully!";
          } else {
            const error = await response.json();
            status.textContent = "Error: " + error.message;
          }
        };
      });
    </script>
  </body>
</html>
